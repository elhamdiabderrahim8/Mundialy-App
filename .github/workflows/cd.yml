name: Flutter CI/CD to GitHub Releases

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter_application_1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 🔐 KEYS (FIX FINAL)
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > upload-keystore.jks

      - name: Create key.properties
        run: |
          echo "storeFile=../upload-keystore.jks" > android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties

      # 🧱 BUILD APK (Google Play / Default)
      - name: Build standard APK
        run: flutter build apk --release

      - name: Rename standard APK
        run: mv build/app/outputs/flutter-apk/app-release.apk mundialy-release.apk

      # 🧱 BUILD APK (APKPure Legacy)
      - name: Build APKPure APK
        env:
          LEGACY_APKPURE_SIGNING: "true"
        run: flutter build apk --release

      - name: Rename APKPure APK
        run: mv build/app/outputs/flutter-apk/app-release.apk mundialy-apkpure.apk

      - name: Upload APKs artifact
        uses: actions/upload-artifact@v4
        with:
          name: mundialy-apks
          path: |
            flutter_application_1/mundialy-release.apk
            flutter_application_1/mundialy-apkpure.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flutter_application_1/mundialy-release.apk
            flutter_application_1/mundialy-apkpure.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}