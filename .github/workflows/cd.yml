name: Flutter CI/CD to GitHub Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter_application_1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 🧱 BUILD
      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk mundialy.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mundialy-apk
          path: flutter_application_1/mundialy.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: flutter_application_1/mundialy.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}