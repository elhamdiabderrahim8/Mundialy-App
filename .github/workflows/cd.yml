name: Flutter CI/CD to GitHub Releases

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter_application_1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 🔐 KEYS (FIX FINAL)
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > upload-keystore.jks

      - name: Create key.properties
        run: |
          echo "storeFile=../upload-keystore.jks" > android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties

      # 🧱 BUILD (IMPORTANT: clean release only)
      - name: Build APK
        run: flutter build apk --release --build-name=1.0.1 --build-number=2

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk mundialy.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mundialy-apk
          path: flutter_application_1/mundialy.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: flutter_application_1/mundialy.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}